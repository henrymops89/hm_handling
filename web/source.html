a-i18n="tab_engine">Motor</span><span class="tab-badge" id="badge-engine"></span></button> <button class="nui-tab" data-cat="transmission" onclick="switchTab('tab-transmission', this)"><span class="tab-icon">⚙️</span> <span class="tab-label" data-i18n="tab_transmission">Getriebe</span><span class="tab-badge" id="badge-transmission"></span></button> <button class="nui-tab" data-cat="suspension" onclick="switchTab('tab-suspension', this)"><span class="tab-icon">🔧</span> <span class="tab-label" data-i18n="tab_suspension">Fahrwerk</span><span class="tab-badge" id="badge-suspension"></span></button> <button class="nui-tab" data-cat="traction" onclick="switchTab('tab-traction', this)"><span class="tab-icon">🏎️</span> <span class="tab-label" data-i18n="tab_traction">Traktion</span><span class="tab-badge" id="badge-traction"></span></button> <button class="nui-tab" data-cat="brakes" onclick="switchTab('tab-brakes', this)"><span class="tab-icon">🛑</span> <span class="tab-label" data-i18n="tab_brakes">Bremsen</span><span class="tab-badge" id="badge-brakes"></span></button> <button class="nui-tab" data-cat="damage" onclick="switchTab('tab-damage', this)"><span class="tab-icon">🛡️</span> <span class="tab-label" data-i18n="tab_damage">Schaden</span><span class="tab-badge" id="badge-damage"></span></button> <button class="nui-tab" data-cat="misc" onclick="switchTab('tab-misc', this)"><span class="tab-icon">🔩</span> <span class="tab-label" data-i18n="tab_misc">Sonstiges</span><span class="tab-badge" id="badge-misc"></span></button><div class="nui-sidebar-section" data-i18n="section_manage">Verwaltung</div><button class="nui-tab" onclick="switchTab('tab-profiles', this)"><span class="tab-icon">💾</span> <span class="tab-label" data-i18n="tab_profiles">Profile</span></button></div><div class="nui-content"><div class="nui-tab-pane" id="tab-search"><div class="d-flex align-items-center justify-content-between mb-2"><div class="nui-section-title m-0" data-i18n="search_results">Suchergeb
