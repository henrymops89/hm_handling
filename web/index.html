<!DOCTYPE html>
<html lang="en" data-bs-theme="dark" style="color-scheme:only light;">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HM Handling</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap"
    rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" />
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

  <style>
    /* ── Bootstrap Icons Fix ─────────────────────────────────────────── */
    .bi {
      display: inline !important;
      vertical-align: -0.125em;
    }

    /* ── Base ────────────────────────────────────────────────────────── */
    *,
    *::before,
    *::after {
      box-sizing: border-box;
    }

    html,
    body {
      font-family: 'Plus Jakarta Sans', sans-serif !important;
      background: transparent !important;
      background-color: transparent !important;
      -webkit-user-select: none;
      user-select: none;
      overflow: hidden !important;
      margin: 0;
    }

    #root {
      position: absolute;
      width: 100vw;
      height: 100vh;
      overflow: hidden !important;
      pointer-events: none;
    }

    #root > * {
      pointer-events: auto;
    }

    /* ── Scrollbar ───────────────────────────────────────────────────── */
    ::-webkit-scrollbar {
      width: 8px;
      height: 8px;
    }

    ::-webkit-scrollbar-track {
      background: #0e0e0e;
    }

    ::-webkit-scrollbar-thumb {
      background: #333;
      border-radius: 100px;
      border: 2px solid #0e0e0e;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: #444;
    }

    /* ── Menu Container ──────────────────────────────────────────────── */
    .nui-menu {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 920px;
      max-width: 95vw;
      height: 600px;
      max-height: 90vh;
      background-color: #111;
      border: 1px solid #2a2a2a;
      border-radius: 8px;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.9);
      display: none;
      flex-direction: column;
      overflow: hidden;
      animation: fadeIn 0.15s ease-out;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translate(-50%, -47%);
      }

      to {
        opacity: 1;
        transform: translate(-50%, -50%);
      }
    }

    /* ── Header ──────────────────────────────────────────────────────── */
    .nui-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 14px;
      border-bottom: 1px solid #2a2a2a;
      background: #0e0e0e;
      flex-shrink: 0;
    }

    .nui-logo {
      width: 26px;
      height: 26px;
      background: linear-gradient(135deg, #0088cc, #005fa3);
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      color: white;
      font-weight: 800;
      flex-shrink: 0;
    }

    .nui-header-info {
      display: flex;
      flex-direction: column;
    }

    .nui-header-title {
      font-size: 14px;
      font-weight: 700;
      color: #e5e5e5;
      line-height: 1.2;
    }

    .nui-header-sub {
      font-size: 11px;
      color: #555;
    }

    .nui-vehicle-badge {
      font-size: 12px;
      font-weight: 600;
      color: #40b4f0;
      background: rgba(0, 136, 204, 0.1);
      border: 1px solid rgba(0, 136, 204, 0.2);
      padding: 3px 10px;
      border-radius: 100px;
    }

    .nui-close-btn {
      background: transparent;
      border: none;
      color: #555;
      cursor: pointer;
      padding: 4px 8px;
      border-radius: 4px;
      font-size: 16px;
      transition: all 0.15s;
      line-height: 1;
    }

    .nui-close-btn:hover {
      color: #f87171;
      background: rgba(239, 68, 68, 0.1);
    }

    /* ── Body Layout ─────────────────────────────────────────────────── */
    .nui-body {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    /* ── Sidebar ─────────────────────────────────────────────────────── */
    .nui-sidebar {
      width: 155px;
      flex-shrink: 0;
      background: #0e0e0e;
      border-right: 1px solid #2a2a2a;
      display: flex;
      flex-direction: column;
      padding: 10px 8px;
      gap: 2px;
      overflow-y: auto;
    }

    .nui-sidebar-section {
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #3a3a3a;
      padding: 8px 8px 4px;
      margin-top: 4px;
    }

    .nui-sidebar-section:first-child {
      margin-top: 0;
    }

    .nui-tab {
      background: transparent;
      border: none;
      color: #666;
      cursor: pointer;
      padding: 7px 10px;
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-size: 12px;
      font-weight: 500;
      border-radius: 6px;
      border-left: 2px solid transparent;
      transition: all 0.12s;
      display: flex;
      align-items: center;
      gap: 8px;
      white-space: nowrap;
      text-align: left;
      width: 100%;
    }

    .nui-tab:hover {
      color: #ccc;
      background: rgba(255, 255, 255, 0.04);
    }

    .nui-tab.active {
      color: #e5e5e5;
      border-left-color: #0088cc;
      background: rgba(0, 136, 204, 0.08);
    }

    .nui-tab i {
      font-size: 13px;
      flex-shrink: 0;
      width: 14px;
      text-align: center;
    }

    /* ── Content ─────────────────────────────────────────────────────── */
    .nui-content {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      background: #111;
    }

    .nui-tab-pane {
      display: none;
    }

    .nui-tab-pane.active {
      display: block;
    }

    /* ── Section Title ───────────────────────────────────────────────── */
    .nui-section-title {
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: #444;
      margin-bottom: 10px;
      margin-top: 2px;
    }

    /* ── Handling Row ────────────────────────────────────────────────── */
    .h-row {
      display: flex;
      align-items: center;
      padding: 8px 12px;
      border-radius: 6px;
      margin-bottom: 4px;
      background: rgba(255, 255, 255, 0.025);
      border: 1px solid transparent;
      transition: all 0.12s;
      gap: 12px;
    }

    .h-row:hover {
      background: rgba(255, 255, 255, 0.05);
      border-color: #2a2a2a;
    }

    .h-row-label {
      flex: 0 0 180px;
      font-size: 12px;
      font-weight: 500;
      color: #aaa;
      display: flex;
      flex-direction: column;
      gap: 1px;
    }

    .h-row-key {
      font-size: 11px;
      color: #555;
      font-family: monospace;
    }

    .h-row-controls {
      flex: 1;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .h-row-val {
      flex: 0 0 70px;
      text-align: right;
      font-size: 12px;
      font-family: monospace;
      color: #888;
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      padding: 3px 8px;
      border-radius: 4px;
      cursor: text;
    }

    .h-row-val:focus {
      outline: none;
      border-color: #0088cc;
      color: #ddd;
    }

    /* ── Slider ──────────────────────────────────────────────────────── */
    input[type="range"].nui-range {
      -webkit-appearance: none;
      width: 100%;
      height: 6px;
      border-radius: 3px;
      background: #222;
      outline: none;
      cursor: pointer;
      transition: background 0.2s;
    }

    input[type="range"].nui-range::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 18px;
      height: 14px;
      border-radius: 4px;
      background: var(--thumb-color, #888);
      box-shadow: 0 1px 4px rgba(0, 0, 0, 0.7);
      cursor: pointer;
      border: none;
      transition: background 0.2s, transform 0.1s;
    }

    input[type="range"].nui-range::-webkit-slider-thumb:hover {
      transform: scaleX(1.15) scaleY(1.08);
    }

    input[type="range"].nui-range::-webkit-slider-runnable-track {
      height: 6px;
      border-radius: 3px;
    }

    /* ── Reset-Btn (kleines X) ───────────────────────────────────────── */
    .h-reset-btn {
      background: transparent;
      border: none;
      color: #3a3a3a;
      cursor: pointer;
      padding: 2px 4px;
      border-radius: 4px;
      font-size: 12px;
      transition: all 0.12s;
      flex-shrink: 0;
    }

    .h-reset-btn:hover {
      color: #f87171;
      background: rgba(239, 68, 68, 0.1);
    }

    /* ── Profile Panel ───────────────────────────────────────────────── */
    .profile-card {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 14px;
      background: rgba(255, 255, 255, 0.025);
      border: 1px solid #2a2a2a;
      border-radius: 6px;
      margin-bottom: 6px;
      transition: all 0.12s;
    }

    .profile-card:hover {
      background: rgba(255, 255, 255, 0.05);
      border-color: #333;
    }

    .profile-card.active-profile {
      border-color: rgba(0, 136, 204, 0.4);
      background: rgba(0, 136, 204, 0.06);
    }

    .profile-name {
      font-size: 13px;
      font-weight: 600;
      color: #ccc;
    }

    .profile-meta {
      font-size: 11px;
      color: #555;
      margin-top: 1px;
    }

    /* ── Buttons ─────────────────────────────────────────────────────── */
    .nui-btn {
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid #333;
      color: #aaa;
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-size: 12px;
      font-weight: 500;
      padding: 6px 12px;
      border-radius: 6px;
      cursor: pointer;
      transition: all 0.12s;
      display: inline-flex;
      align-items: center;
      gap: 5px;
      white-space: nowrap;
    }

    .nui-btn:hover {
      background: rgba(255, 255, 255, 0.1);
      color: #e5e5e5;
      border-color: #444;
    }

    .nui-btn:disabled {
      opacity: 0.35;
      cursor: default;
      pointer-events: none;
    }

    .nui-btn.sm {
      padding: 4px 8px;
      font-size: 11px;
    }

    .nui-btn.primary {
      background: rgba(0, 136, 204, 0.15);
      border-color: rgba(0, 136, 204, 0.35);
      color: #40b4f0;
    }

    .nui-btn.primary:hover {
      background: rgba(0, 136, 204, 0.25);
      color: #70caff;
    }

    .nui-btn.success {
      background: rgba(34, 197, 94, 0.1);
      border-color: rgba(34, 197, 94, 0.25);
      color: #4ade80;
    }

    .nui-btn.success:hover {
      background: rgba(34, 197, 94, 0.2);
    }

    .nui-btn.danger {
      background: rgba(239, 68, 68, 0.1);
      border-color: rgba(239, 68, 68, 0.2);
      color: #f87171;
    }

    .nui-btn.danger:hover {
      background: rgba(239, 68, 68, 0.2);
    }

    .nui-btn.warning {
      background: rgba(251, 146, 60, 0.1);
      border-color: rgba(251, 146, 60, 0.2);
      color: #fb923c;
    }

    .nui-btn.warning:hover {
      background: rgba(251, 146, 60, 0.2);
    }

    /* ── Input ───────────────────────────────────────────────────────── */
    .nui-input {
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 6px;
      color: #ddd;
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-size: 12px;
      padding: 6px 10px;
      outline: none;
      transition: border-color 0.15s;
    }

    .nui-input:focus {
      border-color: #0088cc;
    }

    .nui-input::placeholder {
      color: #3a3a3a;
    }

    /* ── Footer ──────────────────────────────────────────────────────── */
    .nui-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 14px;
      border-top: 1px solid #2a2a2a;
      background: #0e0e0e;
      flex-shrink: 0;
    }

    .nui-footer-info {
      font-size: 11px;
      color: #333;
    }

    .status-dot {
      display: inline-block;
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #22c55e;
      margin-right: 5px;
      box-shadow: 0 0 6px rgba(34, 197, 94, 0.6);
    }

    .tab-icon {
      font-size: 14px;
      flex-shrink: 0;
      width: 18px;
      text-align: center;
    }

    .tab-label {
      flex: 1;
    }

    .tab-badge {
      background: #0088cc;
      color: white;
      font-size: 9px;
      font-weight: 700;
      border-radius: 100px;
      padding: 1px 5px;
      min-width: 16px;
      text-align: center;
      display: none;
      flex-shrink: 0;
      margin-left: 2px;
    }

    .tab-badge.visible {
      display: inline-block;
    }

    .h-row.changed {
      border-left: 2px solid #0088cc !important;
      background: rgba(0, 136, 204, 0.05) !important;
    }

    .h-val-label {
      font-size: 10px;
      color: #555;
      text-align: right;
      flex: 0 0 40px;
      white-space: nowrap;
      font-weight: 600;
    }

    /* ── Tooltip ─────────────────────────────────────────────────────── */
    .h-info-btn {
      background: transparent;
      border: 1px solid #333;
      color: #444;
      cursor: pointer;
      width: 16px;
      height: 16px;
      border-radius: 50%;
      font-size: 10px;
      font-weight: 700;
      font-family: 'Plus Jakarta Sans', sans-serif;
      transition: all 0.12s;
      flex-shrink: 0;
      line-height: 1;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 0;
    }

    .h-info-btn:hover {
      color: #40b4f0;
      border-color: #0088cc;
      background: rgba(0, 136, 204, 0.1);
    }

    #nui-tooltip {
      position: absolute;
      background: #1c1c1c;
      border: 1px solid #333;
      border-radius: 6px;
      padding: 10px 12px;
      max-width: 280px;
      font-size: 12px;
      color: #bbb;
      line-height: 1.5;
      pointer-events: none;
      z-index: 200;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.6);
      display: none;
    }

    #nui-tooltip .tt-title {
      font-size: 11px;
      font-weight: 700;
      color: #e5e5e5;
      margin-bottom: 5px;
      display: block;
    }

    #nui-tooltip .tt-key {
      font-size: 10px;
      font-family: monospace;
      color: #0088cc;
      margin-bottom: 6px;
      display: block;
    }

    /* ── Notification Toast ──────────────────────────────────────────── */
    #nui-toast {
      position: absolute;
      bottom: 50px;
      left: 50%;
      transform: translateX(-50%);
      background: #1a1a1a;
      border: 1px solid #333;
      border-radius: 6px;
      padding: 8px 16px;
      font-size: 12px;
      color: #ccc;
      opacity: 0;
      transition: opacity 0.2s;
      pointer-events: none;
      white-space: nowrap;
      z-index: 999;
    }

    #nui-toast.show {
      opacity: 1;
    }

    /* ── Modal ───────────────────────────────────────────────────────── */
    .nui-modal-backdrop {
      position: absolute;
      inset: 0;
      background: rgba(0, 0, 0, 0.6);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 100;
      backdrop-filter: blur(2px);
    }

    .nui-modal {
      background: #111;
      border: 1px solid #333;
      border-radius: 8px;
      padding: 20px;
      width: 320px;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.8);
    }

    .nui-modal-title {
      font-size: 14px;
      font-weight: 700;
      color: #e5e5e5;
      margin-bottom: 14px;
    }
  </style>
</head>

<body>
  <div id="root">

    <div class="nui-menu" id="nuiMenu">

      <!-- HEADER -->
      <div class="nui-header">
        <div class="d-flex align-items-center gap-2">
          <div class="nui-logo">H</div>
          <div class="nui-header-info">
            <span class="nui-header-title">HM Handling</span>
            <span class="nui-header-sub">MopsScripts</span>
          </div>
        </div>
        <div class="d-flex align-items-center gap-2">
          <span class="nui-vehicle-badge" id="vehicleName">&#128663; T20</span>
          <div style="position:relative;">
            <button class="nui-btn" style="font-size:11px;padding:4px 8px;" onclick="togglePresetMenu()" id="presetBtn">
              &#128196; Preset
            </button>
            <div id="presetMenu"
              style="display:none;position:absolute;top:calc(100% + 4px);right:0;background:#1a1a1a;border:1px solid #333;border-radius:6px;min-width:150px;z-index:50;padding:4px;box-shadow:0 8px 24px rgba(0,0,0,0.6);">
              <div
                style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.08em;color:#444;padding:4px 8px 6px;">
                Supercars</div>
              <button onclick="loadPreset('T20');togglePresetMenu()"
                style="display:block;width:100%;text-align:left;background:transparent;border:none;color:#aaa;font-family:'Plus Jakarta Sans',sans-serif;font-size:12px;padding:5px 10px;border-radius:4px;cursor:pointer;"
                onmouseover="this.style.background='rgba(255,255,255,0.06)'"
                onmouseout="this.style.background='transparent'">
                Progen T20
              </button>
            </div>
          </div>
          <button id="labelModeBtn" class="nui-btn" style="font-size:11px;padding:4px 8px;" onclick="toggleLabelMode()"
            title="Zwischen einfachen und Fachbegriffen wechseln">
            &#128218; Einfach
          </button>
          <button class="nui-close-btn" onclick="closeMenu()">&#10005;</button>
        </div>
      </div>

      <!-- BODY -->
      <div class="nui-body">

        <!-- SIDEBAR -->
        <div class="nui-sidebar">

          <!-- Search -->
          <div style="padding:0 0 8px 0;">
            <div style="position:relative;">
              <span
                style="position:absolute;left:8px;top:50%;transform:translateY(-50%);color:#444;font-size:11px;pointer-events:none;">&#128269;</span>
              <input type="text" id="searchInput" class="nui-input" placeholder="Was willst du anpassen?"
                style="width:100%;padding-left:24px;font-size:11px;" oninput="onSearch(this.value)" />
            </div>
          </div>

          <div style="width:100%;height:1px;background:#1e1e1e;margin-bottom:6px;"></div>

          <div class="nui-sidebar-section">Handling</div>
          <button class="nui-tab active" data-cat="engine" onclick="switchTab('tab-engine', this)">
            <span class="tab-icon">⚡</span> <span class="tab-label">Motor</span><span class="tab-badge"
              id="badge-engine"></span>
          </button>
          <button class="nui-tab" data-cat="transmission" onclick="switchTab('tab-transmission', this)">
            <span class="tab-icon">⚙️</span> <span class="tab-label">Getriebe</span><span class="tab-badge"
              id="badge-transmission"></span>
          </button>
          <button class="nui-tab" data-cat="suspension" onclick="switchTab('tab-suspension', this)">
            <span class="tab-icon">🔧</span> <span class="tab-label">Fahrwerk</span><span class="tab-badge"
              id="badge-suspension"></span>
          </button>
          <button class="nui-tab" data-cat="traction" onclick="switchTab('tab-traction', this)">
            <span class="tab-icon">🏎️</span> <span class="tab-label">Traktion</span><span class="tab-badge"
              id="badge-traction"></span>
          </button>
          <button class="nui-tab" data-cat="brakes" onclick="switchTab('tab-brakes', this)">
            <span class="tab-icon">🛑</span> <span class="tab-label">Bremsen</span><span class="tab-badge"
              id="badge-brakes"></span>
          </button>
          <button class="nui-tab" data-cat="damage" onclick="switchTab('tab-damage', this)">
            <span class="tab-icon">🛡️</span> <span class="tab-label">Schaden</span><span class="tab-badge"
              id="badge-damage"></span>
          </button>
          <button class="nui-tab" data-cat="misc" onclick="switchTab('tab-misc', this)">
            <span class="tab-icon">🔩</span> <span class="tab-label">Sonstiges</span><span class="tab-badge"
              id="badge-misc"></span>
          </button>

          <div class="nui-sidebar-section">Verwaltung</div>
          <button class="nui-tab" onclick="switchTab('tab-profiles', this)">
            <span class="tab-icon">💾</span> <span class="tab-label">Profile</span>
          </button>
        </div>

        <!-- CONTENT -->
        <div class="nui-content">

          <!-- ── SEARCH RESULTS ──────────────────────────────────────── -->
          <div class="nui-tab-pane" id="tab-search">
            <div class="d-flex align-items-center justify-content-between mb-2">
              <div class="nui-section-title m-0">Suchergebnisse</div>
              <span id="search-count" style="font-size:11px;color:#555;"></span>
            </div>
            <div id="rows-search"></div>
          </div>

          <!-- ── ENGINE ──────────────────────────────────────────────── -->
          <div class="nui-tab-pane active" id="tab-engine">
            <div class="nui-section-title">Engine</div>
            <div id="rows-engine"></div>
          </div>

          <!-- ── TRANSMISSION ────────────────────────────────────────── -->
          <div class="nui-tab-pane" id="tab-transmission">
            <div class="nui-section-title">Transmission</div>
            <div id="rows-transmission"></div>

    // Fallback: generisch wenn kein spezifischer Eintrag
    function getValueLabel(f, val) {
      const levels = VALUE_LEVELS[f.key];
      if (levels) {
        const entry = levels.find(l => val <= l.max);
        if (entry) return `<span style="color:${entry.color}">${entry.label}</span>`;
      }
      // Generischer Fallback für Felder ohne eigene Level (Seat Offset etc.)
      if (f.max === f.min) return '';
      const pct = (val - f.min) / (f.max - f.min);
      if (pct <= 0.15) return '<span style="color:#ef4444">Sehr niedrig</span>';
      if (pct <= 0.35) return '<span style="color:#f97316">Niedrig</span>';
      if (pct <= 0.60) return '<span style="color:#555">Mittel</span>';
      if (pct <= 0.80) return '<span style="color:#22c55e">Hoch</span>';
      return '<span style="color:#0088cc">Sehr hoch</span>';
    }

    function buildRow(f) {
      const val = currentValues[f.key] ?? f.default;
      const isChanged = Math.abs(val - f.default) > 0.0001;
      const div = document.createElement('div');
      div.className = 'h-row' + (isChanged ? ' changed' : '');
      div.id = 'row_' + f.key;
      const displayLabel = getLabel(f.key);
      const enLabel = LABELS[f.key]?.en || f.label;
      const levels = VALUE_LEVELS[f.key];
      let initColor = '#888';
      if (levels) { const e = levels.find(l => val <= l.max); if (e) initColor = e.color; }

      div.innerHTML = `
    <div class="h-row-label">
      <span class="h-label-text">${displayLabel}</span>
    </div>
    <div class="h-row-controls">
      <input type="range" class="nui-range" id="range_${f.key}"
             min="${f.min}" max="${f.max}" step="${f.step}" value="${val}"
             style="--thumb-color:${initColor}"
             oninput="onSlider('${f.key}', this.value)" />
    </div>
    <div class="h-val-label" id="vallabel_${f.key}">${getValueLabel(f, val)}</div>
    <input type="text" class="h-row-val" id="val_${f.key}" value="${val}"
           onchange="onValInput('${f.key}', this.value)" onclick="this.select()" />
    ${f.desc ? `<button class="h-info-btn"
      data-key="${f.key}"
      data-label="${displayLabel}"
      data-en="${enLabel}"
      data-desc="${f.desc.replace(/"/g, '&quot;')}"
      onmouseenter="showTooltip(event, this)" onmouseleave="hideTooltip()">?</button>` : ''}
    <button class="h-reset-btn" onclick="resetField('${f.key}')" title="Zurücksetzen">&#8635;</button>`;
      return div;
    }

    // ── Slider / Input Sync ──────────────────────────────────────────────
    function onSlider(key, val) {
      const n = parseFloat(val);
      currentValues[key] = n;
      const inp = document.getElementById('val_' + key);
      if (inp) inp.value = n;
      updateRowState(key, n);
      sendLiveUpdate(key, n);
    }

    function onValInput(key, val) {
      let n = parseFloat(val);
      if (isNaN(n)) return;
      const field = findField(key);
      if (field) n = Math.min(field.max, Math.max(field.min, n));
      currentValues[key] = n;
      const rng = document.getElementById('range_' + key);
      if (rng) rng.value = n;
      const inp = document.getElementById('val_' + key);
      if (inp) inp.value = n;
      updateRowState(key, n);
      sendLiveUpdate(key, n);
    }

    function updateRowState(key, val) {
      const field = findField(key);
      if (!field) return;

      // Value label + color
      const levels = VALUE_LEVELS[field.key];
      let color = '#888';
      if (levels) {
        const entry = levels.find(l => val <= l.max);
        if (entry) color = entry.color;
      }

      const lbl = document.getElementById('vallabel_' + key);
      if (lbl) lbl.innerHTML = getValueLabel(field, val);

      // Slider thumb color via CSS custom property
      const rng = document.getElementById('range_' + key);
      if (rng) rng.style.setProperty('--thumb-color', color);

      // Changed highlight
      const row = document.getElementById('row_' + key);
      if (row) {
        const changed = Math.abs(val - field.default) > 0.0001;
        row.classList.toggle('changed', changed);
      }

      updateCategoryBadge(key);
    }

    function updateCategoryBadge(changedKey) {
      for (const [cat, fields] of Object.entries(HANDLING_FIELDS)) {
        const count = fields.filter(f => Math.abs((currentValues[f.key] ?? f.default) - f.default) > 0.0001).length;
        const badge = document.getElementById('badge-' + cat);
        if (!badge) continue;
        if (count > 0) { badge.textContent = count; badge.classList.add('visible'); }
        else { badge.textContent = ''; badge.classList.remove('visible'); }
      }
    }

    function findField(key) {
      for (const fields of Object.values(HANDLING_FIELDS)) {
        const f = fields.find(x => x.key === key);
        if (f) return f;
      }
      return null;
    }

    function resetField(key) {
      const def = defaultValues[key];
      if (def === undefined) return;
      currentValues[key] = def;
      const rng = document.getElementById('range_' + key);
      if (rng) rng.value = def;
      const inp = document.getElementById('val_' + key);
      if (inp) inp.value = def;
      updateRowState(key, def);
    }

    // ── Load values into UI ──────────────────────────────────────────────
    function loadValues(data) {
      currentValues = { ...defaultValues, ...data };
      for (const key of Object.keys(currentValues)) {
        const rng = document.getElementById('range_' + key);
        const inp = document.getElementById('val_' + key);
        if (rng) rng.value = currentValues[key];
        if (inp) inp.value = currentValues[key];
        updateRowState(key, currentValues[key]);
      }
      updateCategoryBadge();
    }

    // ── NUI Communication ─────────────────────────────────────────────────
    function nuiFetch(endpoint, data) {
      return fetch(`https://${GetParentResourceName()}/${endpoint}`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(data ?? {})
      }).catch(() => { });
    }

    const _liveTimers = {};
    function sendLiveUpdate(key, value) {
      if (_liveTimers[key]) clearTimeout(_liveTimers[key]);
      _liveTimers[key] = setTimeout(() => {
        nuiFetch('liveUpdate', { key, value: currentValues[key] });
        _liveTimers[key] = null;
      }, 50);
    }

    function applyHandling() {
      nuiFetch('applyAll', { handling: currentValues });
      showToast('✓ Handling angewendet');
    }

    function closeMenu() {
      nuiFetch('closeMenu', {});
      document.getElementById('nuiMenu').style.display = 'none';
    }

    // GetParentResourceName fallback für Browser-Preview
    if (typeof GetParentResourceName === 'undefined') {
      function GetParentResourceName() { return 'hm-handling'; }
    }

    // ── NUI Message Listener ─────────────────────────────────────────────
    window.addEventListener('message', function (e) {
      const d = e.data;
      if (!d || !d.action) return;

      switch (d.action) {
        case 'openMenu':
          document.getElementById('nuiMenu').style.display = 'flex';
          if (d.vehicleName) document.getElementById('vehicleName').innerHTML = `<i class="bi bi-car-front"></i> ${d.vehicleName}`;
          if (d.handling) loadValues(d.handling);
          if (d.profiles) renderProfiles(d.profiles);
          if (d.config) {
            if (d.config.language) CONFIG.language = d.config.language;
            if (d.config.labelMode) CONFIG.labelMode = d.config.labelMode;
            refreshAllLabels();
          }
          break;
        case 'closeMenu':
          document.getElementById('nuiMenu').style.display = 'none';
          break;
        case 'updateProfiles':
          if (d.profiles) renderProfiles(d.profiles);
          break;
        case 'updateVehicle':
          if (d.vehicleName) document.getElementById('vehicleName').innerHTML = `<i class="bi bi-car-front"></i> ${d.vehicleName}`;
          if (d.handling) loadValues(d.handling);
          break;
      }
    });

    // ── Search ────────────────────────────────────────────────────────────
    const SEARCH_TAB_BTN = null; // dynamisch

    function onSearch(query) {
      query = query.trim().toLowerCase();

      if (!query) {
        // Zurück zum letzten aktiven Tab oder Engine
        const lastActive = document.querySelector('.nui-tab[data-last="true"]');
        if (lastActive) {
          lastActive.click();
        } else {
          const firstTab = document.querySelector('.nui-tab[data-cat="engine"]');
          if (firstTab) firstTab.click();
        }
        return;
      }

      // Alle Felder über alle Kategorien durchsuchen
      const allFields = Object.values(HANDLING_FIELDS).flat();
      const results = allFields.filter(f => {
        const haystack = [
          f.label, f.key, f.desc,
          ...(f.tags || [])
        ].join(' ').toLowerCase();
        return query.split(' ').every(word => haystack.includes(word));
      });

      // Search-Tab aktivieren
      document.querySelectorAll('.nui-tab-pane').forEach(p => p.classList.remove('active'));
      document.querySelectorAll('.nui-tab').forEach(b => b.classList.remove('active'));
      document.getElementById('tab-search').classList.add('active');

      const container = document.getElementById('rows-search');
      const countEl = document.getElementById('search-count');
      countEl.textContent = results.length + ' Ergebnis' + (results.length !== 1 ? 'se' : '');

      if (results.length === 0) {
        container.innerHTML = `<div style="text-align:center;color:#444;font-size:12px;padding:30px 0;">
      <div style="font-size:24px;margin-bottom:8px;">&#128269;</div>
      Keine Ergebnisse für "<strong style="color:#666;">${query}</strong>"<br>
      <span style="font-size:11px;color:#3a3a3a;">Versuch z.B: schneller, drift, bremsen, tieferlegung</span>
    </div>`;
        return;
      }

      container.innerHTML = '';
      results.forEach(f => {
        const row = buildRow(f);
        // Kategorie-Badge hinzufügen
        const cat = Object.entries(HANDLING_FIELDS).find(([, fields]) => fields.find(x => x.key === f.key))?.[0];
        if (cat) {
          const badge = document.createElement('span');
          badge.style.cssText = 'font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:0.08em;color:#0088cc;background:rgba(0,136,204,0.1);border:1px solid rgba(0,136,204,0.15);padding:1px 5px;border-radius:3px;margin-left:4px;flex-shrink:0;';
          badge.textContent = cat;
          row.querySelector('.h-row-label').appendChild(badge);
        }
        container.appendChild(row);
      });
    }

    // Merke welcher Tab zuletzt aktiv war (nicht Search)
    function initTabTracking() {
      document.querySelectorAll('.nui-tab[data-cat]').forEach(btn => {
        btn.addEventListener('click', () => {
          document.querySelectorAll('.nui-tab[data-cat]').forEach(b => b.removeAttribute('data-last'));
          btn.setAttribute('data-last', 'true');
          const si = document.getElementById('searchInput');
          if (si) si.value = '';
        });
      });
    }

    // ── Tooltip ───────────────────────────────────────────────────────────
    const tooltip = document.getElementById('nui-tooltip');

    function showTooltip(e, btn) {
      if (!tooltip) return;
      const label = btn.dataset.label;
      const key = btn.dataset.key;
      const en = btn.dataset.en;
      const desc = btn.dataset.desc;
      document.getElementById('tt-title').textContent = label;
      document.getElementById('tt-key').innerHTML = `<span style="color:#0088cc;font-family:monospace;">${key}</span>${en && en !== label ? `<span style="color:#444;margin-left:6px;">· ${en}</span>` : ''}`;
      document.getElementById('tt-desc').textContent = desc;
      tooltip.style.display = 'block';
      positionTooltip(e);
    }

    function hideTooltip() {
      if (!tooltip) return;
      tooltip.style.display = 'none';
    }

    document.addEventListener('mousemove', e => {
      if (tooltip && tooltip.style.display === 'block') positionTooltip(e);
    });

    function positionTooltip(e) {
      const menu = document.getElementById('nuiMenu').getBoundingClientRect();
      const tw = 290;
      const margin = 12;
      let x = e.clientX - menu.left + margin;
      let y = e.clientY - menu.top + margin;
      if (x + tw > menu.width - 8) x = e.clientX - menu.left - tw - margin;
      if (y + 120 > menu.height - 8) y = e.clientY - menu.top - 120;
      tooltip.style.left = x + 'px';
      tooltip.style.top = y + 'px';
    }

    // ── Reset All ─────────────────────────────────────────────────────────
    function resetAllValues() {
      loadValues({ ...defaultValues });
      showToast('↺ Alle Werte zurückgesetzt');
    }

    // ── Profile System ────────────────────────────────────────────────────
    function openSaveModal() {
      document.getElementById('profileNameInput').value = '';
      document.getElementById('saveModal').style.display = 'flex';
      setTimeout(() => document.getElementById('profileNameInput').focus(), 50);
    }

    function closeSaveModal() {
      document.getElementById('saveModal').style.display = 'none';
    }

    function saveProfile() {
      const name = document.getElementById('profileNameInput').value.trim();
      if (!name) { showToast('⚠ Bitte einen Namen eingeben'); return; }

      // Server speichert — Antwort kommt via updateProfiles Event
      nuiFetch('saveProfile', {
        name: name,
        handling: { ...currentValues },
      });

      closeSaveModal();
    }

    function loadProfile(profileData) {
      // profileData ist das ganze Profil-Objekt aus dem Server
      if (!profileData || !profileData.data) return;
      loadValues(profileData.data);
      activeProfileName = profileData.name;
      // Auch ans Fahrzeug senden
      nuiFetch('loadProfile', { handling: profileData.data });
      renderProfiles(profiles);
      showToast(`↓ Profil "${profileData.name}" geladen`);
    }

    function deleteProfile(profileId, profileName) {
      nuiFetch('deleteProfile', { id: profileId });
      showToast(`✗ Profil "${profileName}" wird gelöscht…`);
    }

    function renderProfiles(profileList) {
      if (profileList) profiles = profileList;
      const container = document.getElementById('profile-list');
      if (!profiles || profiles.length === 0) {
        container.innerHTML = `<div style="text-align:center;color:#444;font-size:12px;padding:30px 0;">
      <i class="bi bi-bookmark" style="font-size:24px;display:block;margin-bottom:8px;"></i>
      Keine Profile gespeichert</div>`;
        return;
      }
      container.innerHTML = profiles.map(p => `
    <div class="profile-card ${p.name === activeProfileName ? 'active-profile' : ''}">
      <div>
        <div class="profile-name">${p.name}</div>
        <div class="profile-meta">${p.vehicle || ''} &bull; ${p.date || ''}</div>
      </div>
      <div class="d-flex gap-1">
        <button class="nui-btn sm primary" onclick='loadProfile(${JSON.stringify(p)})'><i class="bi bi-download"></i> Laden</button>
        <button class="nui-btn sm danger"  onclick="deleteProfile(${p.id}, '${p.name.replace(/'/g, "\\'")}')"><i class="bi bi-trash"></i></button>
      </div>
    </div>`).join('');
    }

    // ── Export / Import JSON ──────────────────────────────────────────────
    function exportJSON() {
      const json = JSON.stringify(currentValues, null, 2);
      const blob = new Blob([json], { type: 'application/json' });
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = 'handling.json';
      a.click();
      showToast('↑ JSON exportiert');
    }

    function openImportModal() {
      document.getElementById('importJSON').value = '';
      document.getElementById('importModal').style.display = 'flex';
    }

    function importJSON() {
      try {
        const data = JSON.parse(document.getElementById('importJSON').value);
        loadValues(data);
        document.getElementById('importModal').style.display = 'none';
        showToast('✓ JSON importiert');
      } catch {
        showToast('⚠ Ungültiges JSON Format');
      }
    }

    function toggleLabelMode() {
      CONFIG.labelMode = CONFIG.labelMode === 'simple' ? 'technical' : 'simple';
      const btn = document.getElementById('labelModeBtn');
      if (btn) {
        btn.textContent = CONFIG.labelMode === 'simple' ? '📖 Einfach' : '🔬 fBrakeForce';
        btn.style.color = CONFIG.labelMode === 'technical' ? '#0088cc' : '';
      }
      refreshAllLabels();
    }

    function refreshAllLabels() {
      // Alle gerenderten Zeilen updaten
      for (const fields of Object.values(HANDLING_FIELDS)) {
        for (const f of fields) {
          const labelEl = document.querySelector(`#row_${f.key} .h-label-text`);
          const infoBtn = document.querySelector(`#row_${f.key} .h-info-btn`);
          if (labelEl) labelEl.textContent = getLabel(f.key);
          if (infoBtn) infoBtn.dataset.label = getLabel(f.key);
        }
      }
      // Search-Ergebnisse auch updaten falls aktiv
      const si = document.getElementById('searchInput');
      if (si && si.value.trim()) onSearch(si.value);
    }

    function togglePresetMenu() {
      const m = document.getElementById('presetMenu');
      m.style.display = m.style.display === 'none' ? 'block' : 'none';
    }
    document.addEventListener('click', e => {
      if (!e.target.closest('#presetBtn') && !e.target.closest('#presetMenu')) {
        const m = document.getElementById('presetMenu');
        if (m) m.style.display = 'none';
      }
    });

    // ── Tab Switch ────────────────────────────────────────────────────────
    function switchTab(id, btn) {
      document.querySelectorAll('.nui-tab-pane').forEach(p => p.classList.remove('active'));
      document.querySelectorAll('.nui-tab').forEach(b => b.classList.remove('active'));
      document.getElementById(id).classList.add('active');
      btn.classList.add('active');
    }

    // ── Toast ─────────────────────────────────────────────────────────────
    let toastTimer;
    function showToast(msg) {
      const t = document.getElementById('nui-toast');
      t.textContent = msg;
      t.classList.add('show');
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => t.classList.remove('show'), 2000);
    }

    // ── ESC ───────────────────────────────────────────────────────────────
    document.addEventListener('keydown', e => { if (e.key === 'Escape') closeMenu(); });

    // ── Startup ───────────────────────────────────────────────────────────
    initFields();
    renderProfiles();
    initTabTracking();
  </script>
</body>

</html>
